<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>引力枢纽 · 张泽禹生日·诊断版</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/china.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* 样式保持不变（与上一版完全相同），此处省略以节省篇幅，请确保您复制的是完整版 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { background: linear-gradient(145deg, #f7fff0 0%, #e2f3d5 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .map-card { width: 1300px; max-width: 100%; background: rgba(255,255,255,0.75); backdrop-filter: blur(12px); border-radius: 48px; padding: 24px 28px; border: 1px solid rgba(120,180,90,0.25); position: relative; }
    .creator-signature { position: absolute; top: 22px; left: 30px; font-weight: 600; font-size: 1.5rem; color: #2b5e1c; background: rgba(220,250,200,0.6); padding: 6px 22px; border-radius: 60px; }
    .notice-corner { position: absolute; bottom: 26px; right: 32px; background: #fafff7; padding: 14px 22px; border-radius: 36px 12px; border-left: 6px solid #6da546; max-width: 320px; color: #1e4216; font-size: 0.9rem; }
    .title-badge { text-align: center; margin-bottom: 8px; }
    #chinaMap { width: 100%; height: 540px; border-radius: 32px; background: #e6f7dd; }
    .info-panel { display: flex; gap: 20px; margin-top: 16px; }
    .total-clicks-card { flex: 1.2; background: #dff0d3; border-radius: 60px 20px; padding: 16px 26px; display: flex; align-items: center; justify-content: space-between; }
    .total-number { font-size: 3.4rem; background: #1f4f12; color: #f3ffe7; padding: 6px 24px; border-radius: 60px; }
    .province-detail { flex: 2.2; background: #f5fff0; border-radius: 30px 12px; padding: 16px 22px; }
    .message-section { max-height: 150px; overflow-y: auto; }
    .sync-badge { margin-top: 8px; background: #d4eac2; border-radius: 20px; padding: 6px 12px; display: inline-block; }
  </style>
</head>
<body>
<div class="map-card">
  <div class="creator-signature">引力枢纽 <span>· 张泽禹生日献礼</span></div>
  <div class="notice-corner">
    <strong>✨ 星光守则 ✨</strong>
    <p>① 此网站专注于庆祝张泽禹生日，切勿留其他留言。</p>
    <p>② 点击次数越多，该省份越亮，证明喜欢泽禹的人越多 💚</p>
    <div style="margin-top:12px;border-top:1px dashed #9bc181;padding-top:8px;">
      <span style="font-weight:600;">🌐 诊断状态</span><br>
      <span id="syncStatusText" class="sync-badge">⏳ 检测中...</span>
    </div>
  </div>
  <div class="title-badge"><h2><i>🗺️ 泽禹 · 绿色星光点亮中国</i></h2></div>
  <div id="chinaMap"></div>
  <div class="info-panel">
    <div class="total-clicks-card"><span class="total-label">🌿 全国总点亮</span><span class="total-number" id="totalClicksDisplay">0</span></div>
    <div class="province-detail">
      <div class="province-header"><span class="current-province" id="selectedProvinceName">点击省份</span><span class="province-clicks" id="selectedProvinceClicks">0 次</span></div>
      <div class="message-section" id="messageListContainer"><div class="empty-message">✨ 点击任意省份，留下祝福</div></div>
    </div>
  </div>
</div>
<script>
  (function(){
    "use strict";
    // 配置
    const SUPABASE_URL = 'https://gizmhqjgfirzavlxbjs.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_HMmjvtwiqJmtC67WsIqtkQ_iMlL7snW';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const PROVINCE_LIST = ["北京","天津","上海","重庆","河北","山西","辽宁","吉林","黑龙江","江苏","浙江","安徽","福建","江西","山东","河南","湖北","湖南","广东","海南","四川","贵州","云南","陕西","甘肃","青海","台湾","内蒙古","广西","西藏","宁夏","新疆","香港","澳门"];
    let provinceData = {};
    let currentSelected = "北京";
    let chart = null;
    const syncStatusText = document.getElementById('syncStatusText');

    function createEmptyData() {
      const data = {};
      PROVINCE_LIST.forEach(n => data[n] = { count: 0, messages: [] });
      return data;
    }

    async function loadFromSupabase() {
      try {
        syncStatusText.innerText = '⏳ 查询中...';
        const { data, error } = await supabase.from('province_stats').select('data').eq('id', 1).single();
        if (error) {
          syncStatusText.innerText = '❌ 查询错误: ' + error.message;
          console.error(error);
          throw error;
        }
        if (data && data.data) {
          const cloud = data.data;
          const complete = createEmptyData();
          PROVINCE_LIST.forEach(n => { if (cloud[n]) complete[n] = cloud[n]; });
          provinceData = complete;
          syncStatusText.innerText = '✅ 已连接云端';
        } else {
          syncStatusText.innerText = '⚠️ 表中无数据，尝试插入...';
          provinceData = createEmptyData();
          const { error: insertError } = await supabase.from('province_stats').insert({ id: 1, data: provinceData });
          if (insertError) {
            syncStatusText.innerText = '❌ 插入失败: ' + insertError.message;
          } else {
            syncStatusText.innerText = '✅ 已初始化云端';
          }
        }
      } catch (e) {
        syncStatusText.innerText = '⚠️ 离线模式: ' + (e.message || '网络错误');
        provinceData = createEmptyData();
      }
      renderMap();
      updateTotalDisplay();
      renderProvinceDetail(currentSelected);
    }

    function renderMap() {
      if (!chart) return;
      const maxCount = Math.max(...Object.values(provinceData).map(d => d.count), 1);
      chart.setOption({
        series: [{
          type: 'map', map: 'china', roam: true, zoom: 1.1, center: [104, 35],
          itemStyle: { borderColor: '#3b7525', areaColor: '#d4eac2' },
          label: { show: true, color: '#1e4a0b' },
          data: PROVINCE_LIST.map(n => ({ name: n, value: provinceData[n].count }))
        }],
        visualMap: { min: 0, max: maxCount, inRange: { color: ['#d2efc0','#a1d884','#6bb84a','#3b9620','#1f6e0a'] } }
      });
    }

    function updateTotalDisplay() {
      document.getElementById('totalClicksDisplay').innerText = Object.values(provinceData).reduce((s,i)=>s+i.count,0);
    }

    function renderProvinceDetail(name) {
      const d = provinceData[name];
      if(!d) return;
      document.getElementById('selectedProvinceName').innerText = name;
      document.getElementById('selectedProvinceClicks').innerText = d.count + ' 次';
      const container = document.getElementById('messageListContainer');
      const msgs = d.messages || [];
      container.innerHTML = msgs.length ? [...msgs].reverse().map(m => `<div class="message-item">🕒 ${m.time} “${m.text}”</div>`).join('') : '<div class="empty-message">🌱 还没有留言</div>';
    }

    async function handleClick(name) {
      if (!provinceData[name]) return;
      provinceData[name].count += 1;
      const msg = prompt(`💚 为 ${name} 点亮！祝福张泽禹:`, "泽禹生日快乐！🎂");
      if (msg && msg.trim()) {
        provinceData[name].messages.push({ text: msg.trim(), time: new Date().toLocaleTimeString('zh-CN', { hour12: false }) });
      }
      try {
        syncStatusText.innerText = '⏳ 同步中...';
        const { error } = await supabase.from('province_stats').update({ data: provinceData }).eq('id', 1);
        if (error) throw error;
        syncStatusText.innerText = '✅ 已同步';
      } catch (e) {
        syncStatusText.innerText = '⚠️ 保存失败: ' + e.message;
      }
      currentSelected = name;
      renderMap();
      updateTotalDisplay();
      renderProvinceDetail(name);
    }

    function initChart() {
      chart = echarts.init(document.getElementById('chinaMap'));
      chart.on('click', (p) => { if (p.componentType === 'series') handleClick(p.name); });
      window.addEventListener('resize', () => chart.resize());
      provinceData = createEmptyData();
      renderMap();
    }

    async function start() {
      initChart();
      await loadFromSupabase();
    }
    start();
  })();
</script>
</body>
</html>
